# L0 Python Unit Tests - Low-level component tests
#
# These tests verify individual components and plugins at a low level.
# They require:
#   - TensorRT >= 10.15
#   - CUDA-capable GPU
#   - A CUDA build of torch (plugin tests drive device memory via torch)
#   - Built plugin library (build/libNvInfer_edgellm_plugin.so) for the plugin tests

tests:
  - tests/defs/test_common.py::test_build_project

