# L0 Export Tests - Checkpoint export for Ampere runtime models
# Uses tensorrt_edgellm/scripts/export.py for FP16 and pre-quantized models
tests:
  # FP16 LLM exports
  - tests/defs/test_checkpoint_export.py::test_checkpoint_export[Qwen2.5-0.5B-Instruct-fp16]
  # Pre-quantized INT8 SmoothQuant LLM (Qwen3 architecture)
  - tests/defs/test_checkpoint_export.py::test_checkpoint_export[Qwen3-0.6B-INT8-SQ-int8_sq]
  # Pre-quantized INT4 AWQ VLM (Qwen3-VL architecture)
  - tests/defs/test_checkpoint_export.py::test_checkpoint_export[Qwen3-VL-2B-Instruct-INT4-AWQ-int4_awq]
  # Pre-quantized INT4 AWQ VLM with TRT-native VIT attention (TRT >= 11)
  - tests/defs/test_checkpoint_export.py::test_checkpoint_export[Qwen3-VL-2B-Instruct-INT4-AWQ-int4_awq-trt11]
  # Pre-quantized GPTQ VLM (InternVL3 architecture)
  - tests/defs/test_checkpoint_export.py::test_checkpoint_export[InternVL3-1B-GPTQ-Int4-int4_gptq]
  # LoRA insertion export (FP16 Qwen2.5)
  - tests/defs/test_checkpoint_export.py::test_checkpoint_lora_export[Qwen2.5-0.5B-Instruct-fp16]
